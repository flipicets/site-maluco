<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload de Arquivos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dimensao">

    <!-- Barra lateral -->
    <div class="barra">
            <a href="user.html" class="icone">
                <img src="img/user.png" class="logo">   
            </a>

            <a href="index.html" class="icone">🏠︎</a>

            <!-- Modal Aviso -->
            <button class="icone">🗁</button>

            <a href="pasta_privada.html" class="icone">🗀</a>
            <!--
            Botão da Receita Federal
            - href: endereço do site
            - target="_blank": abre em nova aba
            - onclick: pede confirmação antes do redirecionamento
            -->

            <a href="https://servicos.receitafederal.gov.br/lista-grupo?categoria=8"
            target="_blank" class="icone" 

            onclick="return confirm('Você será redirecionado para o portal da Receita Federal. Deseja continuar?')">
            🖳
            </a>

            <a href="prioridades.html" class="icone">!</a>

     </div>

    <!-- Conteúdo principal -->
    <div class="main">

        <div class="header">
            <h1>Gerenciador de Arquivos</h1>
            <div class="top-info">
                <div class="status">
                    Online
                </div>

                <input class="pesquisa" placeholder="Pesquisa">
            </div>
        </div>

        <div class="grid">

            <!-- Upload -->
            <div class="card wide">

                <h2>Adicionar Arquivos</h2>

                <div class="upload-area">

                    <p>Arraste arquivos aqui</p>
                    <p>ou</p>

                    <label for="fileInput" class="upload-label">
                        Selecionar Arquivos
                    </label>

                    <input type="file" id="fileInput" multiple>

                </div>

                <div class="file-list" id="fileList"></div>

            </div>

            <!-- Cards -->
            <div class="card">
                <h3>Documentos</h3>
                <p class="small">PDFs, DOCX e TXT</p>
            </div>

            <div class="card">
                <h3>Imagens</h3>
                <p class="small">PNG, JPG e GIF</p>
            </div>
            
            <div class="card">
                    <h3>Resumo</h3>
                    <br>
                    <p>Total de arquivos:</p>
                    <strong>26 arquivos</strong>

                    <br><br>

                    <p>Espaço utilizado:</p>
                    <strong>4.7 GB</strong>
            </div>

            <div class="card">
                <h3>Armazenamento</h3>
                <p>2.4 GB usados</p>
            </div>

            <!-- Painel lateral -->
            <div class="side-panel">

                <div class="card">
                    <h3>Ações</h3>

                    <div class="button">
                        Enviar Arquivos
                    </div>

                    <br>

                    <div class="button">
                        Criar Pasta
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

<script>

const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

fileInput.addEventListener("change", () => {

    fileList.innerHTML = "";

    for (let i = 0; i < fileInput.files.length; i++) {

        const file = fileInput.files[i];

        const div = document.createElement("div");
        div.classList.add("file-item");

        div.innerHTML = `
            <strong>${file.name}</strong>
            <div class="small">
                ${(file.size / 1024).toFixed(2)} KB
            </div>
        `;

        fileList.appendChild(div);
    }

});

</script>

</body>
</html>
