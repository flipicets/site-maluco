<head>
    <meta charset="UTF-8">
    <title>IR.Flow</title>

</head>

<body>

<div class="dimensao">

<!-- Barra lateral -->
        <div class="barra">
            <a href="user.html" class="icone">
             <img src="img/user.png" class="logo">   
            </a>


            <a href="index.html" class="icone">🏠︎</a>

            <!-- Modal Aviso -->
            <button class="icone">🗁</button>

            <a href="pasta_privada.html" class="icone">🗀</a>

                <!--

        </div>

    <!-- MAIN = conteudo principal -->

    <div class="main">

        <div class="header">
            <h1>Irflow</h1>
            <h1>Pasta privada</h1>
            <input class="pesquisa" placeholder="pesquisa">
        </div>

        <div class="grid">

            <div class="card center">
                <div class="formulario-lista">

                <h2>Crie sua lista</h2>

                <!-- NOME -->

                <div class="campo">

                    <input type="text"
                    id="nomeLista"
                    placeholder="Nome da lista:">

                </div>

                <!-- PRIVADO -->

                <div class="opcoes">

                    <label>

                        <input type="radio"
                        name="tipo"
                        value="aberto"
                        checked
                        onclick="mostrarSenha(false)">

                        Aberto

                    </label>

                    <label>

                        <input type="radio"
                        name="tipo"
                        value="privado"
                        onclick="mostrarSenha(true)">

                        Privado

                    </label>

                </div>

                <!-- SENHA -->

              <div class="campo"
                id="senhaArea"
                style="display:none;">

                <input type="password"
                id="senha"
                placeholder="Ex: Maria@2025">

                <small>

                    xMínimo 8 caracteres, contendo letra maiúscula,
                    minúscula, número e caractere especial.

                </small>

            </div>
                <!-- BOTÃO -->

                <button class="botao-criar"
                onclick="criarLista()">

                    Criar

                </button>

                <!-- LISTAS CRIADAS -->

                <div id="listasCriadas"></div>

                <!-- ACESSO PRIVADO -->

                <div id="acessoPrivado"
                style="display:none; margin-top:20px;">

                    <input type="password"
                    id="senhaAcesso"
                    placeholder="Informe a senha">

                    <button onclick="entrarListaPrivada()">
                        Entrar
                    </button>

                </div>

                <!-- UPLOAD -->

                <div id="areaUpload"
                style="display:none; margin-top:20px;">

                    <input type="file"
                    id="arquivoInput">

                    <button onclick="anexarArquivo()">
                        Adicionar Arquivo
                    </button>

                    <div id="listaArquivosArea"></div>

                </div>

            </div>
            </div>

            <div class="side-panel">

                <div class="button">
                    Crie uma lista
                </div>

                <div class="card">
                    Nº de listas
                    <h2 id="numeroListas">0</h2>
                </div>

                <div class="button">
                    Acessar arquivos
                </div>

                <div class="card">
                    Nº de arquivos
                    <h2 id="numeroArquivos">0</h2>
                </div>

            </div>

            <!-- NÃO ALTERADO -->

            <div class="card" id="avisos">
                Avisos
            </div>

        </div>

    </div>

</div>

<script>

    /* Java conteudo dos modais */

    const modal1 = document.getElementById('modal1');

    function abrirModal1() {
        modal1.style.display = 'flex';
    }

    function fecharModal1() {
        modal1.style.display = 'none';
    }

    /* Fim dos modais */


    let listas = 0;
    let arquivos = 0;

    let senhaPrivadaSalva = "";

    // MOSTRAR SENHA

    function mostrarSenha(privado){

        let senhaArea =
        document.getElementById("senhaArea");

        if(privado){

            senhaArea.style.display = "block";

        }
        else{

            senhaArea.style.display = "none";

        }

    }

    // CRIAR LISTA

    function criarLista(){

        let nome =
        document.getElementById("nomeLista").value;

        let tipo =
        document.querySelector(
        'input[name="tipo"]:checked'
        ).value;

        let senha =
        document.getElementById("senha").value;

        if(nome == ""){

            alert("Digite o nome da lista");
            return;

        }

        if(tipo == "privado"){

    if(senha == ""){

        alert("Crie uma senha");
        return;

    }

    let regex =
    /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&.#_-]).{8,}$/;

    if(!regex.test(senha)){

        alert(
        "A senha deve conter:\n\n" +
        "• Mínimo 8 caracteres\n" +
        "• 1 letra maiúscula\n" +
        "• 1 letra minúscula\n" +
        "• 1 número\n" +
        "• 1 caractere especial"
        );

        return;

    }

}

        listas++;

        document.getElementById("numeroListas")
        .innerHTML = listas;

        let area =
        document.getElementById("listasCriadas");

        let novaLista =
        document.createElement("div");

        novaLista.className = "card";

        // PRIVADA

        if(tipo == "privado"){

            senhaPrivadaSalva = senha;

            novaLista.innerHTML = `
                🔒 ${nome}
                <br><br>
                <button onclick="abrirPrivada()">
                    Acessar
                </button>
            `;

            document.getElementById("avisos")
            .innerHTML =
            "Lista privada criada com senha";

            alert(
            "Lista privada criada!"
            );

        }

        // PUBLICA

        else{

            novaLista.innerHTML = `
                📂 ${nome}
                <br><br>
                <button onclick="abrirPublica()">
                    Abrir
                </button>
            `;

            document.getElementById("avisos")
            .innerHTML =
            "Lista pública criada";

            alert(
            "Lista pública criada!"
            );

        }

        area.appendChild(novaLista);

        document.getElementById("nomeLista")
        .value = "";

        document.getElementById("senha")
        .value = "";

    }

    // ABRIR PRIVADA

    function abrirPrivada(){

        document.getElementById("acessoPrivado")
        .style.display = "block";

    }

    // ENTRAR PRIVADA

    function entrarListaPrivada(){

        let senhaDigitada =
        document.getElementById("senhaAcesso").value;

        if(senhaDigitada == senhaPrivadaSalva){

            alert("Acesso permitido");

            document.getElementById("areaUpload")
            .style.display = "block";

        }
        else{

            alert("Senha incorreta");

        }

    }

    // ABRIR PUBLICA

    function abrirPublica(){

        document.getElementById("areaUpload")
        .style.display = "block";

    }

    // ANEXAR ARQUIVO

function anexarArquivo(){

    let input =
    document.getElementById("arquivoInput");

    if(input.files.length == 0){

        alert("Selecione um arquivo");
        return;

    }

    let arquivo =
    input.files[0];

    let area =
    document.getElementById("listaArquivosArea");

    let novoArquivo =
    document.createElement("div");

    novoArquivo.className = "card";

    let urlArquivo =
    URL.createObjectURL(arquivo);

    novoArquivo.innerHTML = `

        📎
        <a href="${urlArquivo}" target="_blank">

            ${arquivo.name}

        </a>

        <br><br>

        <button onclick="excluirArquivo(this)">
            Excluir
        </button>

    `;

    area.appendChild(novoArquivo);

    arquivos++;

    document.getElementById("numeroArquivos")
    .innerHTML = arquivos;

    document.getElementById("avisos")
    .innerHTML =
    "Arquivo anexado com sucesso";

    input.value = "";

}

function excluirArquivo(botao){

    botao.parentElement.remove();

    arquivos--;

    if(arquivos < 0){

        arquivos = 0;

    }

    document.getElementById("numeroArquivos")
    .innerHTML = arquivos;

    document.getElementById("avisos")
    .innerHTML =
    "Arquivo removido com sucesso";

}

</script>

</body>
